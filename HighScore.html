<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PandaType - Highscores</title>
    <link rel="icon" type="image/png" href="./img/file.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.css"
    integrity="sha512-tx5+1LWHez1QiaXlAyDwzdBTfDjX07GMapQoFTS74wkcPMsI3So0KYmFe6EHZjI8+eSG0ljBlAQc3PQ5BTaZtQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Poetsen+One&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./script/Highscore.js"></script>
    <style>
      #h1 {
        color: var(--uno-1);
        font-family: "Sora", sans-serif;
        font-size: 40px;
        font-weight: 700;
        letter-spacing: -0.02em;
        transform: translateY(15px);
      }
      #h1 i {
        color: var(--PrimaryColor);
        margin-right: 12px;
        filter: drop-shadow(0 0 8px rgba(232, 168, 56, 0.35));
      }
      #table {
        border-collapse: separate;
        border-spacing: 0;
        width: 900px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        overflow: hidden;
      }
      #table th {
        height: 50px;
        font-size: x-large;
        font-family: "Sora", sans-serif;
        font-weight: 600;
      }
      #table td, #table th {
        padding: 20px;
      }
      #table td {
        font-family: "Roboto Mono", monospace;
        font-size: 0.95rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      #table tr:nth-child(even) {
        background-color: rgba(255, 255, 255, 0.03);
      }
      #table tr:hover {
        background-color: rgba(232, 168, 56, 0.08);
        color: var(--textPrimary);
      }
      #table th {
        padding-top: 12px;
        padding-bottom: 12px;
        text-align: left;
        background-color: rgba(255, 255, 255, 0.04);
        color: var(--PrimaryColor);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      #overflow::-webkit-scrollbar {
        width: 6px;
      }
      #overflow::-webkit-scrollbar-track {
        background: transparent;
      }
      #overflow::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      #overflow {
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.1) transparent;
        height: 690px;
        overflow-y: auto;
      }
      @media (max-width:1850px) {
        #overflow { height: 630px; }
      }
      @media (max-width:1600px) {
        #overflow { height: 540px; }
      }
      body {
        max-height: 100vh;
        overflow: hidden;
      }
      @media (max-width: 1530px) {
        body {
          overflow-y: auto;
        }
        #overflow {
          height: auto;
          max-height: calc(100vh - 180px);
        }
      }

      /* Skeleton loader */
      .skeleton-bar {
        height: 16px;
        border-radius: 6px;
        background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
        background-size: 200% 100%;
        animation: skeleton-shimmer 1.5s ease-in-out infinite;
      }
      .skeleton-row td {
        border-bottom: 1px solid rgba(255,255,255,0.03);
      }
      @keyframes skeleton-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>
</head>
<body>
    <main>
        <div class="heading heading--sub">
          <div id="logo-col">
            <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
              <img src="./img/brown.png" style="width:30px;" />
              <div id="heading-text">PandaType</div>
            </a>
          </div>
          <div id="heading-button">
            <a href="profile.html" class="nav-link"><i class="fa-solid fa-chart-simple"></i> Profile</a>
            <a href="index.html" class="nav-link"><i class="fa-solid fa-keyboard"></i> Practice</a>
          </div>
        </div>
        <div class="hs-layout">
            <div class="sidebar">
                <div class="logo-col">
                  <p>TypingPanda</p>
                  <img src="./img/file.png">
                </div>
                <a href="index.html" class="col">
                  <i class="fa-solid fa-keyboard"></i>
                  <p>Practice</p>
                </a>
                <a href="profile.html" class="col">
                  <i class="fa-solid fa-chart-simple"></i>
                  <p>Profile</p>
                </a>
                <a href="HighScore.html" class="col">
                  <i class="fa-solid fa-trophy"></i>
                  <p>Highscore</p>
                </a>
                <a href="https://github.com/sanjeevs9/TypingGame" target="_blank" class="col">
                  <i class="fa-regular fa-circle-question"></i>
                  <p>Info</p>
                </a>
              </div>

              <div class="hs-content">
                <h1 id="h1">
                  <i class="fa-solid fa-trophy"></i>HighScore</h1>
              <div id="overflow">
                <table id="table" class="table">
                  <thead>
                    <tr>
                      <th>#Rank</th>
                      <th>User</th>
                      <th>Speed</th>
                    </tr>
                </thead>
                <tbody id="output">
                  <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:40px"></div></td><td><div class="skeleton-bar" style="width:160px"></div></td><td><div class="skeleton-bar" style="width:80px"></div></td></tr>
                  <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:40px"></div></td><td><div class="skeleton-bar" style="width:130px"></div></td><td><div class="skeleton-bar" style="width:70px"></div></td></tr>
                  <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:40px"></div></td><td><div class="skeleton-bar" style="width:180px"></div></td><td><div class="skeleton-bar" style="width:90px"></div></td></tr>
                  <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:40px"></div></td><td><div class="skeleton-bar" style="width:140px"></div></td><td><div class="skeleton-bar" style="width:75px"></div></td></tr>
                  <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:40px"></div></td><td><div class="skeleton-bar" style="width:120px"></div></td><td><div class="skeleton-bar" style="width:85px"></div></td></tr>
                  <tr class="skeleton-row"><td><div class="skeleton-bar" style="width:40px"></div></td><td><div class="skeleton-bar" style="width:170px"></div></td><td><div class="skeleton-bar" style="width:70px"></div></td></tr>
                </tbody>
                </table>
              </div>
              </div>
        </div>

    </main>
    <script src="./Network.js"></script>
    
</body>
</html>
